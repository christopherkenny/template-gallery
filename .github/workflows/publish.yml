name: Publish Quarto to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
    contents: write
    pages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.1'

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages:
            any::knitr
            any::rmarkdown

      - name: Install Google Fonts
        run: |
          wget -O Spectral.zip https://fonts.google.com/download?family=Spectral
          unzip -d spectral/ Spectral.zip
          mv spectral /usr/share/fonts/
          fc-cache -fv

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tinytex: true

      - name: Render ctk-article
        if: ${{ !cancelled() }}
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: ctk-article

      - name: Render ctk-memo
        if: ${{ !cancelled() }}
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: ctk-memo

      - name: Render ctk-syllabus
        if: ${{ !cancelled() }}
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: ctk-syllabus

      - name: Render tufte
        if: ${{ !cancelled() }}
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: tufte

      - name: Render ctk-legal
        if: ${{ !cancelled() }}
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: ctk-legal

      - name: Render and Publish Website
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
