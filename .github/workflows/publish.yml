name: Publish Gallery

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: gallery-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.3"

      - name: Install R dependencies
        run: Rscript -e "install.packages(c('yaml', 'jsonlite'), repos = 'https://cloud.r-project.org')"

      - name: Check canonical template sync
        run: Rscript scripts/check-templates-sync.R templates.yml https://raw.githubusercontent.com/christopherkenny/christopherkenny.github.io/main/webscripts/templates.yml

      - name: Build manifest
        run: Rscript scripts/build-manifest.R templates.yml data/template-overrides.yml data/template-manifest.yml

      - name: Validate template manifest
        run: Rscript scripts/validate-manifest.R data/template-manifest.yml

      - name: Write render matrix
        id: matrix
        shell: bash
        run: echo "matrix=$(Rscript scripts/write-render-matrix.R data/template-manifest.yml)" >> "$GITHUB_OUTPUT"

  build-templates:
    name: Render ${{ matrix.slug }}
    needs: validate
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validate.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install R
        if: matrix.needs_r
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.3"

      - name: Install system libraries for R packages
        if: matrix.needs_r
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libpng-dev

      - name: Install template-specific system libraries
        if: matrix.has_extra_system_packages
        id: extra-system-packages
        continue-on-error: true
        shell: bash
        run: |
          sudo apt-get update
          printf '%s' "${EXTRA_SYSTEM_PACKAGES_JSON}" | jq -r '.[]' | xargs -r sudo apt-get install -y
        env:
          EXTRA_SYSTEM_PACKAGES_JSON: ${{ toJson(matrix.extra_system_packages) }}

      - name: Install R dependencies
        if: matrix.needs_r
        run: Rscript -e "install.packages(c('knitr', 'rmarkdown', 'ggplot2'), repos = 'https://cloud.r-project.org'); stopifnot(requireNamespace('knitr', quietly = TRUE), requireNamespace('rmarkdown', quietly = TRUE), requireNamespace('ggplot2', quietly = TRUE))"

      - name: Install template-specific R dependencies
        if: matrix.has_extra_r_packages
        id: extra-r-packages
        continue-on-error: true
        shell: bash
        run: |
          pkgs=$(printf '%s' "${EXTRA_R_PACKAGES_JSON}" | jq -r '.[]' | sed "s/.*/'&'/" | paste -sd, -)
          Rscript -e "pkgs <- c(${pkgs}); install.packages(pkgs, repos = 'https://cloud.r-project.org'); stopifnot(all(vapply(pkgs, requireNamespace, logical(1), quietly = TRUE)))"
        env:
          EXTRA_R_PACKAGES_JSON: ${{ toJson(matrix.extra_r_packages) }}

      - name: Cache fonts
        if: matrix.engine == 'typst'
        id: cache-fonts
        uses: actions/cache@v5
        with:
          path: fonts
          key: spectral-v1

      - name: Download Spectral font
        if: matrix.engine == 'typst' && steps.cache-fonts.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p fonts/spectral
          base_url="https://raw.githubusercontent.com/google/fonts/main/ofl/spectral"
          wget -P fonts/spectral/ "$base_url/Spectral-ExtraLight.ttf"
          wget -P fonts/spectral/ "$base_url/Spectral-Light.ttf"
          wget -P fonts/spectral/ "$base_url/Spectral-Regular.ttf"
          wget -P fonts/spectral/ "$base_url/Spectral-Medium.ttf"
          wget -P fonts/spectral/ "$base_url/Spectral-SemiBold.ttf"
          wget -P fonts/spectral/ "$base_url/Spectral-Bold.ttf"
          wget -P fonts/spectral/ "$base_url/Spectral-ExtraBold.ttf"

      - name: Install Spectral system-wide
        if: matrix.engine == 'typst'
        shell: bash
        run: |
          sudo mkdir -p /usr/share/fonts/truetype/spectral
          sudo cp fonts/spectral/*.ttf /usr/share/fonts/truetype/spectral/
          sudo fc-cache -fv

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Show Quarto version
        run: quarto --version

      - name: Install TinyTeX
        if: matrix.engine == 'latex'
        uses: r-lib/actions/setup-tinytex@v2

      - name: Install Ghostscript
        if: matrix.engine == 'latex'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ghostscript

      - name: Install template-specific TeX dependencies
        if: matrix.has_extra_tex_packages
        id: extra-tex-packages
        continue-on-error: true
        shell: bash
        run: |
          printf '%s' "${EXTRA_TEX_PACKAGES_JSON}" | jq -r '.[]' | xargs -r tlmgr install
        env:
          EXTRA_TEX_PACKAGES_JSON: ${{ toJson(matrix.extra_tex_packages) }}

      - name: Prepare artifact directory
        if: always()
        shell: bash
        run: mkdir -p artifact

      - name: Materialize template
        id: materialize-template
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p "_template/${{ matrix.slug }}"
          cd "_template/${{ matrix.slug }}"
          quarto use template "${{ matrix.install_target }}" --no-prompt > "${GITHUB_WORKSPACE}/artifact/materialize.log" 2>&1

      - name: Fetch extra template files
        if: matrix.has_extra_files
        shell: bash
        run: |
          repo="${MATRIX_REPO#https://github.com/}"
          target_dir="_template/${MATRIX_SLUG}/${MATRIX_PATH}"
          mkdir -p "${target_dir}"
          printf '%s' "${EXTRA_FILES_JSON}" | jq -r '.[]' | while IFS= read -r rel; do
            url="https://raw.githubusercontent.com/${repo}/main/${rel}"
            dest="${target_dir}/${rel}"
            mkdir -p "$(dirname "${dest}")"
            curl -fsSL "${url}" -o "${dest}"
            printf 'downloaded %s -> %s\n' "${url}" "${dest}"
          done
        env:
          EXTRA_FILES_JSON: ${{ toJson(matrix.extra_files) }}
          MATRIX_SLUG: ${{ matrix.slug }}
          MATRIX_REPO: ${{ matrix.repo }}
          MATRIX_PATH: ${{ matrix.path }}

      - name: Render template example
        if: steps.materialize-template.outcome == 'success' && steps.extra-system-packages.outcome != 'failure' && steps.extra-r-packages.outcome != 'failure' && steps.extra-tex-packages.outcome != 'failure'
        id: render-template
        continue-on-error: true
        shell: bash
        working-directory: _template/${{ matrix.slug }}/${{ matrix.path }}
        run: |
          render_target="."
          expected_pdf="${{ matrix.output_pdf }}"
          extra_args=()
          render_args_json='${{ toJson(matrix.render_args) }}'
          if [ "${{ matrix.render_target }}" = "file" ] && [ -n "${{ matrix.input }}" ]; then
            render_target="${{ matrix.input }}"
            if [ ! -f "${render_target}" ]; then
              mapfile -t qmd_files < <(find . -maxdepth 1 -type f -name '*.qmd' | sort)
              if [ "${#qmd_files[@]}" -eq 1 ]; then
                render_target="${qmd_files[0]#./}"
              fi
            fi
            expected_pdf="$(basename "${render_target}" .qmd).pdf"
          fi
          if [ "${{ matrix.has_render_args }}" = "true" ]; then
            mapfile -t extra_args < <(printf '%s' "${render_args_json}" | jq -r '.[]')
          fi
          {
            echo "resolved_input=${render_target}"
            echo "expected_pdf=${expected_pdf}"
          } >> "$GITHUB_OUTPUT"
          quarto render "${render_target}" "${extra_args[@]}" > "${GITHUB_WORKSPACE}/artifact/render.log" 2>&1

      - name: Capture recursive file list
        if: always()
        shell: bash
        run: |
          target_dir="_template/${{ matrix.slug }}"

          if [ -d "${target_dir}" ]; then
            find "${target_dir}" \( -type f -o -type d \) | sort > artifact/files.txt
          else
            printf 'target directory missing: %s\n' "${target_dir}" > artifact/files.txt
          fi

      - name: Collect build outputs
        id: collect
        if: always()
        shell: bash
        run: |
          status="missing"
          extra_system_outcome="${{ steps.extra-system-packages.outcome }}"
          extra_r_outcome="${{ steps.extra-r-packages.outcome }}"
          extra_tex_outcome="${{ steps.extra-tex-packages.outcome }}"
          materialize_outcome="${{ steps.materialize-template.outcome }}"
          render_outcome="${{ steps.render-template.outcome }}"
          if [ "${extra_system_outcome}" = "failure" ] || [ "${extra_r_outcome}" = "failure" ] || [ "${extra_tex_outcome}" = "failure" ]; then
            render_outcome="failure"
          elif [ "${materialize_outcome}" = "failure" ] && [ "${render_outcome}" != "success" ]; then
            render_outcome="failure"
          fi

          if [ "${render_outcome}" = "success" ]; then
            status="success"
          elif [ "${render_outcome}" = "failure" ]; then
            status="failure"
          fi

          expected_pdf="${{ steps.render-template.outputs.expected_pdf || matrix.output_pdf }}"
          pdf_path="_template/${{ matrix.slug }}/${{ matrix.path }}/${expected_pdf}"

          if [ -f "${pdf_path}" ]; then
            cp "${pdf_path}" "artifact/${{ matrix.slug }}.pdf"
          elif [ "${status}" = "success" ]; then
            status="missing-artifact"
          fi

          if [ -f "artifact/render.log" ]; then
            tail -n 200 "artifact/render.log" > "artifact/render-tail.log"
          fi

          failure_class=""
          failure_detail=""
          if [ "${extra_system_outcome}" = "failure" ]; then
            failure_class="setup-system-library"
            failure_detail="failed to install extra system libraries"
          elif [ "${extra_r_outcome}" = "failure" ]; then
            failure_class="setup-r-package"
            failure_detail="failed to install extra R dependencies"
          elif [ "${extra_tex_outcome}" = "failure" ]; then
            failure_class="setup-tex-package"
            failure_detail="failed to install extra TeX packages"
          elif [ "${materialize_outcome}" = "failure" ]; then
            failure_class="materialize"
            failure_detail="quarto use template failed"
          elif [ "${status}" = "missing-artifact" ]; then
            failure_class="missing-pdf"
            failure_detail="render completed but expected PDF was not found"
          elif [ "${render_outcome}" = "failure" ] && [ -f "artifact/render.log" ]; then
            if grep -qi "there is no package called" artifact/render.log; then
              failure_class="missing-r-package"
              failure_detail=$(grep -i -m1 "there is no package called" artifact/render.log | sed 's/^[[:space:]]*//')
            elif grep -qi "Error executing 'Rscript'\|Failed to spawn 'Rscript'\|Rscript: command not found" artifact/render.log; then
              failure_class="missing-r-runtime"
              failure_detail=$(grep -i -m1 "Rscript" artifact/render.log | sed 's/^[[:space:]]*//')
            elif grep -qi "libpng not found\|systemfonts\|textshaping\|svglite" artifact/render.log; then
              failure_class="missing-system-library"
              failure_detail=$(grep -i -m1 "libpng not found\|systemfonts\|textshaping\|svglite" artifact/render.log | sed 's/^[[:space:]]*//')
            elif grep -qi "Undefined control sequence\|compilation failed- error\|LaTeX Error:" artifact/render.log; then
              failure_class="latex"
              failure_detail=$(grep -i -m1 "Undefined control sequence\|compilation failed- error\|LaTeX Error:" artifact/render.log | sed 's/^[[:space:]]*//')
            elif grep -qi "typst" artifact/render.log; then
              failure_class="typst"
              failure_detail=$(grep -i -m1 "typst" artifact/render.log | sed 's/^[[:space:]]*//')
            else
              failure_class="render"
              failure_detail=$(tail -n 1 artifact/render-tail.log 2>/dev/null || true)
            fi
          fi

          yaml_quote() {
            printf "'%s'" "$(printf "%s" "$1" | sed "s/'/''/g")"
          }

          cat > artifact/result.yml <<YAML
          slug: ${{ matrix.slug }}
          name: ${{ matrix.name }}
          repo: ${{ matrix.repo }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          status: ${status}
          failure_class: $(yaml_quote "${failure_class}")
          failure_detail: $(yaml_quote "${failure_detail}")
          pdf:
          YAML

          {
            echo "status=${status}"
            echo "failure_class=${failure_class}"
            echo "failure_detail<<EOF"
            printf '%s\n' "${failure_detail}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: template-${{ matrix.slug }}
          path: artifact
          if-no-files-found: error

      - name: Fail job with surfaced error
        if: always() && steps.collect.outputs.status != 'success'
        shell: bash
        run: |
          echo "Template build failed for ${{ matrix.slug }}"
          if [ -n "${{ steps.collect.outputs.failure_class }}" ]; then
            echo "Failure class: ${{ steps.collect.outputs.failure_class }}"
          fi
          if [ -n "${{ steps.collect.outputs.failure_detail }}" ]; then
            echo "Failure detail: ${{ steps.collect.outputs.failure_detail }}"
          fi
          if [ -f artifact/render-tail.log ]; then
            echo ""
            echo "--- render-tail.log ---"
            cat artifact/render-tail.log
          elif [ -f artifact/render.log ]; then
            echo ""
            echo "--- render.log (tail) ---"
            tail -n 200 artifact/render.log
          elif [ -f artifact/materialize.log ]; then
            echo ""
            echo "--- materialize.log ---"
            tail -n 200 artifact/materialize.log
          fi
          exit 1

  build-site:
    name: Build Site
    needs: [validate, build-templates]
    if: always() && needs.validate.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download template artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: template-*
          merge-multiple: false

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.3"

      - name: Install R dependencies
        run: Rscript -e "install.packages('yaml', repos = 'https://cloud.r-project.org')"

      - name: Build manifest
        run: Rscript scripts/build-manifest.R templates.yml data/template-overrides.yml data/template-manifest.yml

      - name: Merge build results
        run: Rscript scripts/merge-build-results.R artifacts data/build-results.yml assets/pdfs

      - name: Generate gallery page
        run: Rscript scripts/generate-gallery.R data/template-manifest.yml data/build-results.yml index.qmd data/build-meta.yml

      - name: Write job summary
        shell: bash
        run: Rscript scripts/write-job-summary.R data/template-manifest.yml data/build-results.yml >> "$GITHUB_STEP_SUMMARY"

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Show Quarto version
        run: quarto --version

      - name: Record Quarto version
        shell: bash
        run: |
          version=$(quarto --version | head -n 1 | tr -d '\r')
          cat > data/build-meta.yml <<YAML
          quarto_version: "${version}"
          YAML

      - name: Render website
        run: quarto render .

      - name: Upload site artifact
        uses: actions/upload-artifact@v6
        with:
          name: site-preview
          path: _site

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy
    needs: [build-templates, build-site]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && needs.build-site.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
