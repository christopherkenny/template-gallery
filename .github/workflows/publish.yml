name: Publish Quarto to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
    contents: write
    pages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tinytex: true

      - name: Just render #Publish to GitHub Pages (and render)
        uses: quarto-dev/quarto-actions/render@v2
        with:
          #target: gh-pages
          path: ctk-article
