name: Publish Quarto to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
    contents: write
    pages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.1'

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages:
            any::knitr
            any::rmarkdown

      - name: Cache fonts
        id: cache-fonts
        uses: actions/cache@v3
        with:
          path: fonts
          key: spectral-v1

      - name: Download Spectral Font
        if: steps.cache-fonts.outputs.cache-hit != 'true'
        run: |
          mkdir -p fonts/spectral
          # Download TTF files directly from GitHub
          base_url="https://raw.githubusercontent.com/google/fonts/main/ofl/spectral"

          wget -P fonts/spectral/ "$base_url/Spectral-ExtraLight.ttf"
          wget -P fonts/spectral/ "$base_url/Spectral-Light.ttf"
          wget -P fonts/spectral/ "$base_url/Spectral-Regular.ttf"
          wget -P fonts/spectral/ "$base_url/Spectral-Medium.ttf"
          wget -P fonts/spectral/ "$base_url/Spectral-SemiBold.ttf"
          wget -P fonts/spectral/ "$base_url/Spectral-Bold.ttf"
          wget -P fonts/spectral/ "$base_url/Spectral-ExtraBold.ttf"

      - name: Install Spectral system-wide
        run: |
          sudo mkdir -p /usr/share/fonts/truetype/spectral
          sudo cp fonts/spectral/*.ttf /usr/share/fonts/truetype/spectral/
          sudo fc-cache -fv
          fc-list | grep -i spectral

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tinytex: true

      - name: Render ctk-article
        if: ${{ !cancelled() }}
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: ctk-article

      - name: Render ctk-memo
        if: ${{ !cancelled() }}
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: ctk-memo

      - name: Render ctk-syllabus
        if: ${{ !cancelled() }}
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: ctk-syllabus

      - name: Render tufte
        if: ${{ !cancelled() }}
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: tufte

      - name: Render ctk-legal
        if: ${{ !cancelled() }}
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: ctk-legal

      - name: Render and Publish Website
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
