name: Publish Gallery

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: gallery-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.3"

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::yaml
            any::jsonlite

      - name: Check canonical template sync
        run: Rscript scripts/check-templates-sync.R templates.yml https://raw.githubusercontent.com/christopherkenny/christopherkenny.github.io/main/webscripts/templates.yml

      - name: Build manifest
        run: Rscript scripts/build-manifest.R templates.yml data/template-overrides.yml data/template-manifest.yml

      - name: Validate template manifest
        run: Rscript scripts/validate-manifest.R data/template-manifest.yml

      - name: Write render matrix
        id: matrix
        shell: bash
        run: echo "matrix=$(Rscript scripts/write-render-matrix.R data/template-manifest.yml)" >> "$GITHUB_OUTPUT"

  build-local-templates:
    needs: validate
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validate.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.3"

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::knitr
            any::rmarkdown
            any::jsonlite

      - name: Cache fonts
        id: cache-fonts
        uses: actions/cache@v5
        with:
          path: fonts
          key: spectral-v1

      - name: Download Spectral font
        if: steps.cache-fonts.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p fonts/spectral
          base_url="https://raw.githubusercontent.com/google/fonts/main/ofl/spectral"
          wget -P fonts/spectral/ "$base_url/Spectral-ExtraLight.ttf"
          wget -P fonts/spectral/ "$base_url/Spectral-Light.ttf"
          wget -P fonts/spectral/ "$base_url/Spectral-Regular.ttf"
          wget -P fonts/spectral/ "$base_url/Spectral-Medium.ttf"
          wget -P fonts/spectral/ "$base_url/Spectral-SemiBold.ttf"
          wget -P fonts/spectral/ "$base_url/Spectral-Bold.ttf"
          wget -P fonts/spectral/ "$base_url/Spectral-ExtraBold.ttf"

      - name: Install Spectral system-wide
        shell: bash
        run: |
          sudo mkdir -p /usr/share/fonts/truetype/spectral
          sudo cp fonts/spectral/*.ttf /usr/share/fonts/truetype/spectral/
          sudo fc-cache -fv

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.12

      - name: Install TinyTeX
        uses: r-lib/actions/setup-tinytex@v2

      - name: Prepare artifact directory
        if: always()
        shell: bash
        run: mkdir -p artifact

      - name: Render local example
        if: matrix.mode == 'local'
        id: render
        continue-on-error: true
        shell: bash
        working-directory: ${{ matrix.path }}
        run: quarto render . > "${GITHUB_WORKSPACE}/artifact/render.log" 2>&1

      - name: Clone external template
        if: matrix.mode == 'external'
        shell: bash
        run: git clone --depth 1 "${{ matrix.repo }}" "_external/${{ matrix.slug }}"

      - name: Render external example
        if: matrix.mode == 'external'
        id: render-external
        continue-on-error: true
        shell: bash
        working-directory: _external/${{ matrix.slug }}/${{ matrix.path }}
        run: quarto render . > "${GITHUB_WORKSPACE}/artifact/render.log" 2>&1

      - name: Materialize external template
        if: matrix.mode == 'external-template'
        id: materialize-template
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p "_template/${{ matrix.slug }}"
          cd "_template/${{ matrix.slug }}"
          quarto use template "${{ matrix.install_target }}" --no-prompt > "${GITHUB_WORKSPACE}/artifact/materialize.log" 2>&1

      - name: Fetch extra template files
        if: matrix.mode == 'external-template' && matrix.extra_files != ''
        shell: bash
        run: |
          Rscript -e "files <- jsonlite::fromJSON(Sys.getenv('EXTRA_FILES_JSON')); if (is.character(files) && length(files) == 1 && !startsWith(Sys.getenv('EXTRA_FILES_JSON'), '[')) files <- c(files); repo <- sub('^https://github.com/', '', Sys.getenv('MATRIX_REPO')); target_dir <- file.path('_template', Sys.getenv('MATRIX_SLUG'), Sys.getenv('MATRIX_PATH')); dir.create(target_dir, recursive = TRUE, showWarnings = FALSE); for (rel in files) { url <- sprintf('https://raw.githubusercontent.com/%s/main/%s', repo, rel); dest <- file.path(target_dir, rel); dir.create(dirname(dest), recursive = TRUE, showWarnings = FALSE); download.file(url, destfile = dest, mode = 'wb', quiet = FALSE); cat(sprintf('downloaded %s -> %s\\n', url, dest)); }"
        env:
          EXTRA_FILES_JSON: ${{ toJson(matrix.extra_files) }}
          MATRIX_SLUG: ${{ matrix.slug }}
          MATRIX_REPO: ${{ matrix.repo }}
          MATRIX_PATH: ${{ matrix.path }}

      - name: Capture materialized tree
        if: matrix.mode == 'external-template'
        shell: bash
        run: |
          if [ -d "_template/${{ matrix.slug }}" ]; then
            find "_template/${{ matrix.slug }}" -maxdepth 3 \( -type f -o -type d \) | sort > artifact/tree.txt
          else
            printf 'materialized directory missing: _template/%s\n' "${{ matrix.slug }}" > artifact/tree.txt
          fi

      - name: Render template example
        if: matrix.mode == 'external-template' && steps.materialize-template.outcome == 'success'
        id: render-template
        continue-on-error: true
        shell: bash
        working-directory: _template/${{ matrix.slug }}/${{ matrix.path }}
        run: |
          touch "${GITHUB_WORKSPACE}/artifact/render-start.txt"
          render_target="."
          if [ "${{ matrix.render_target }}" = "file" ] && [ -n "${{ matrix.input }}" ]; then
            render_target="${{ matrix.input }}"
          fi
          quarto render "${render_target}" > "${GITHUB_WORKSPACE}/artifact/render.log" 2>&1

      - name: Collect build outputs
        if: always()
        shell: bash
        run: |
          status="missing"
          render_outcome="${{ steps.render.outcome }}"
          materialize_outcome=""
          if [ "${{ matrix.mode }}" = "external" ]; then
            render_outcome="${{ steps.render-external.outcome }}"
          elif [ "${{ matrix.mode }}" = "external-template" ]; then
            materialize_outcome="${{ steps.materialize-template.outcome }}"
            render_outcome="${{ steps.render-template.outcome }}"
            if [ "${materialize_outcome}" = "failure" ] && [ "${render_outcome}" != "success" ]; then
              render_outcome="failure"
            fi
          fi

          if [ "${render_outcome}" = "success" ]; then
            status="success"
          elif [ "${render_outcome}" = "failure" ]; then
            status="failure"
          fi

          pdf_path="${{ matrix.path }}/${{ matrix.output_pdf }}"
          if [ "${{ matrix.mode }}" = "external" ]; then
            pdf_path="_external/${{ matrix.slug }}/${{ matrix.path }}/${{ matrix.output_pdf }}"
          elif [ "${{ matrix.mode }}" = "external-template" ]; then
            pdf_path="_template/${{ matrix.slug }}/${{ matrix.path }}/${{ matrix.output_pdf }}"
            if [ -d "_template/${{ matrix.slug }}/${{ matrix.path }}" ] && [ ! -f "${pdf_path}" ]; then
              discovered_pdf=$(find "_template/${{ matrix.slug }}/${{ matrix.path }}" -type f -name '*.pdf' -newer "artifact/render-start.txt" -printf '%T@ %p\n' | sort -nr | head -n 1 | cut -d' ' -f2-)
              if [ -n "${discovered_pdf}" ]; then
                pdf_path="${discovered_pdf}"
              fi
            fi
          fi

          if [ -f "${pdf_path}" ]; then
            cp "${pdf_path}" "artifact/${{ matrix.slug }}.pdf"
          fi

          if [ -f "artifact/render.log" ]; then
            tail -n 200 "artifact/render.log" > "artifact/render-tail.log"
          fi

          cat > artifact/result.yml <<YAML
          slug: ${{ matrix.slug }}
          name: ${{ matrix.name }}
          mode: ${{ matrix.mode }}
          repo: ${{ matrix.repo }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          artifact_name: template-${{ matrix.slug }}
          install_target: ${{ matrix.install_target }}
          path: ${{ matrix.path }}
          input: ${{ matrix.input }}
          output_pdf: ${{ matrix.output_pdf }}
          status: ${status}
          materialize_outcome: ${materialize_outcome}
          render_outcome: ${render_outcome}
          pdf_path: ${pdf_path}
          pdf:
          YAML

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: template-${{ matrix.slug }}
          path: artifact
          if-no-files-found: error

  build-site:
    needs: [validate, build-local-templates]
    if: always() && needs.validate.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download template artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: template-*
          merge-multiple: false

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.3"

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::yaml

      - name: Build manifest
        run: Rscript scripts/build-manifest.R templates.yml data/template-overrides.yml data/template-manifest.yml

      - name: Merge build results
        run: Rscript scripts/merge-build-results.R artifacts data/build-results.yml assets/pdfs

      - name: Generate gallery page
        run: Rscript scripts/generate-gallery.R data/template-manifest.yml data/build-results.yml index.qmd

      - name: Write job summary
        shell: bash
        run: Rscript scripts/write-job-summary.R data/template-manifest.yml data/build-results.yml >> "$GITHUB_STEP_SUMMARY"

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.12

      - name: Render website
        run: quarto render .

      - name: Upload site artifact
        uses: actions/upload-artifact@v6
        with:
          name: site-preview
          path: _site

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: [build-local-templates, build-site]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && needs.build-site.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
