source: https://raw.githubusercontent.com/christopherkenny/christopherkenny.github.io/main/webscripts/templates.yml
entries:
- slug: annual-reviews
  name: Annual Reviews
  category: Journal templates
  description: For Annual Reviews drafts.
  repo: https://github.com/christopherkenny/annual-reviews
  image: https://raw.githubusercontent.com/christopherkenny/annual-reviews/main/template_1.png
  type: Quarto
  badges:
  - Quarto
  - LaTeX
  kind: template
  engine: latex
  ci:
    install_target: christopherkenny/annual-reviews
    input: template.qmd
    output_pdf: template.pdf
    needs_r: yes
    render_args:
    - --pdf-engine
    - pdflatex
    - -M
    - classoption=numbers
