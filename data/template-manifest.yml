  kind: template
  engine: latex
  ci:
    install_target: christopherkenny/apsr
    input: template.qmd
    output_pdf: template.pdf
    needs_r: yes
    extra_system_packages:
    - libfontconfig1-dev
    - libcairo2-dev
    - libharfbuzz-dev
    - libfribidi-dev
    extra_r_packages: kableExtra
    extra_tex_packages: pgf
